name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy_back:
        description: 'Deploy backend + DB migrations'
        type: boolean
        default: true
      deploy_front:
        description: 'Deploy frontend'
        type: boolean
        default: true

jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      front: ${{ steps.result.outputs.front }}
      back: ${{ steps.result.outputs.back }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: changes
        if: github.event_name == 'push'
        run: |
          PREV=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')

          if [ -z "$PREV" ]; then
            echo "First tag = baseline, nothing to deploy"
            echo "front=false" >> "$GITHUB_OUTPUT"
            echo "back=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing $PREV → HEAD"
          DIFF=$(git diff --name-only "$PREV" HEAD)
          echo "$DIFF"

          if echo "$DIFF" | grep -q '^packages/front/'; then
            echo "front=true" >> "$GITHUB_OUTPUT"
          else
            echo "front=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$DIFF" | grep -qE '^packages/(back|shared)/'; then
            echo "back=true" >> "$GITHUB_OUTPUT"
          else
            echo "back=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set outputs
        id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "front=${{ inputs.deploy_front }}" >> "$GITHUB_OUTPUT"
            echo "back=${{ inputs.deploy_back }}" >> "$GITHUB_OUTPUT"
          else
            echo "front=${{ steps.changes.outputs.front || 'false' }}" >> "$GITHUB_OUTPUT"
            echo "back=${{ steps.changes.outputs.back || 'false' }}" >> "$GITHUB_OUTPUT"
          fi

  deploy-back:
    name: Deploy Backend + DB migrations
    needs: detect
    if: needs.detect.outputs.back == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run DB migrations
        working-directory: packages/back
        run: npx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build backend bundle
        run: pnpm --filter @ik-photos/back run build:bundle

      - name: Copy Dockerfile into bundle
        run: cp packages/back/Dockerfile packages/back/bundle/Dockerfile

      - name: Install Koyeb CLI
        run: curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/main/install.sh | bash

      - name: Deploy to Koyeb
        run: |
          koyeb deploy ./packages/back/bundle ik-photos/api \
            --archive-builder docker \
            --instance-type free \
            --ports 3004:http \
            --regions fra
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}

  deploy-front:
    name: Deploy Frontend
    needs: [detect, deploy-back]
    if: |
      always() &&
      needs.detect.outputs.front == 'true' &&
      (needs.deploy-back.result == 'success' || needs.deploy-back.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @ik-photos/front build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - name: Deploy to AlwaysData
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh-ik-photos.alwaysdata.net
          username: ik-photos
          key: ${{ secrets.ALWAYSDATA_SSH_KEY }}
          password: ${{ secrets.ALWAYSDATA_PASSWORD }}
          source: packages/front/dist/*
          target: /home/ik-photos/www
          strip_components: 3
